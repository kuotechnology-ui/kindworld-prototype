server {
    listen $PORT;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    resolver 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Proxy LINE token exchange — LINE's /token endpoint blocks browser CORS requests
    location /api/line-token {
        proxy_pass https://api.line.me/oauth2/v2.1/token;
        proxy_ssl_server_name on;
        proxy_set_header Host api.line.me;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type "application/x-www-form-urlencoded";
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Proxy LINE push messages — send message to a single LINE user
    location /api/line-push {
        proxy_pass https://api.line.me/v2/bot/message/push;
        proxy_ssl_server_name on;
        proxy_set_header Host api.line.me;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Content-Type "application/json";
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Proxy LINE multicast — send same message to up to 500 users at once
    location /api/line-multicast {
        proxy_pass https://api.line.me/v2/bot/message/multicast;
        proxy_ssl_server_name on;
        proxy_set_header Host api.line.me;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Content-Type "application/json";
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Proxy LINE broadcast — send message to ALL followers
    location /api/line-broadcast {
        proxy_pass https://api.line.me/v2/bot/message/broadcast;
        proxy_ssl_server_name on;
        proxy_set_header Host api.line.me;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Content-Type "application/json";
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Proxy LINE QR code image — prevents referrer blocking by LINE's CDN
    location /api/line-qr {
        proxy_pass https://qr-official.line.me/g/p/149jddew.png;
        proxy_ssl_server_name on;
        proxy_set_header Host qr-official.line.me;
        proxy_set_header Referer "";
        proxy_set_header User-Agent "Mozilla/5.0";
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400";
    }

    # Proxy LINE profile fetch — LINE's /v2/profile also blocks browser CORS
    location /api/line-profile {
        proxy_pass https://api.line.me/v2/profile;
        proxy_ssl_server_name on;
        proxy_set_header Host api.line.me;
        proxy_set_header Authorization $http_authorization;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
